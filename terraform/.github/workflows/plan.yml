name: Terraform Plan

on:
  pull_request:
    branches: [ main ]

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
      - name: Terraform Fmt
        run: terraform fmt -check
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: terraform plan
